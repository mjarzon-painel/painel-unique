services:
  - type: web
    name: painel-unique
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: META_TOKEN
        sync: false            # voce define no painel do Render (nao fica no repo)
      - key: DEFAULT_ACCOUNT
        value: act_1187119852516898
      - key: GRAPH_VERSION
        value: v21.0
      - key: PANEL_USER
        sync: false            # usuario de login (defina no Render)
      - key: PANEL_PASS
        sync: false            # senha de login (defina no Render)
      - key: SESSION_SECRET
        generateValue: true    # o Render gera um segredo aleatorio
